<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Quiz</title>
    <link rel="stylesheet" href="../css/home.css" />
    <link rel="stylesheet" href="../css/create.css" />
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <!-- MDB -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.6.0/mdb.min.css" rel="stylesheet" />
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.6.0/mdb.min.js"></script>
    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <!-- Popper JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <!-- Latest compiled JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>

<body>
    <div class="page-bg">
        <div>
            <nav class="mb-4 navbar navbar-expand-lg">
                <a class="navbar-brand font-bold" href="#">Quizopedia</a>
                <button class="navbar-toggler" type="button" data-toggle="collapse"
                    data-target="#navbarSupportedContent-4" aria-controls="navbarSupportedContent-4"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent-4">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item active ml-auto">
                            <a class="nav-link" href="#"><i class="fa fa-envelope"></i>Home<span
                                    class="sr-only">(current)</span></a>
                        </li>
                        <li class="nav-item ml-auto">
                            <a class="nav-link" href="#"><i class="fa fa-gear"></i>Create</a>
                        </li>
                        <li class="nav-item ml-auto">
                            <a class="nav-link" href="#"><i class="fa fa-gear"></i>Join</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>

        <div class="create-quiz-body">
            <div class="quiz-header text-center">
                <h2>Quiz Details</h2>
            </div>
            <div class="quiz-header">
                <input type="text" class="input-text" id="quiz-title" placeholder="Untitled Quiz" value="" />
            </div>
        </div>
        <div class="controls">
            <a href="#" class="myButton">Add Questions</a>
        </div>

        <div class="question-table">
            <div class="text-center">
                <h2>Questions</h2>
            </div>
        </div>

        <div class="create-button">
            <a href="#" class="myButton">Create Quiz</a>
        </div>
    </div>
</body>

</html>
